<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archived Tasks - Project HQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen">
        <div class="flex">
            <!-- Sidebar -->
            <aside class="w-64 bg-[#1e3a5f] min-h-screen p-6 hidden lg:block">
                <h1 class="text-white text-xl font-bold mb-1">Project HQ</h1>
                <p class="text-blue-300 text-xs mb-8">Jeff Oldroyd</p>
                <nav class="space-y-2">
                    <a href="/" class="w-full text-left px-4 py-3 rounded-lg text-blue-200 hover:bg-white/5 hover:text-white text-sm font-medium block">
                        <span class="inline-block w-2 h-2 rounded-full mr-2 bg-white"></span>
                        All Projects
                    </a>
                    <a href="/future" class="w-full text-left px-4 py-3 rounded-lg text-blue-200 hover:bg-white/5 hover:text-white text-sm font-medium block">
                        <span class="inline-block w-2 h-2 rounded-full mr-2 bg-amber-400"></span>
                        Future Projects
                    </a>
                    <a href="/models" class="w-full text-left px-4 py-3 rounded-lg text-blue-200 hover:bg-white/5 hover:text-white text-sm font-medium block">
                        <span class="inline-block w-2 h-2 rounded-full mr-2 bg-pink-400"></span>
                        Idea Models
                    </a>
                    <a href="/resources" class="w-full text-left px-4 py-3 rounded-lg text-blue-200 hover:bg-white/5 hover:text-white text-sm font-medium block">
                        <span class="inline-block w-2 h-2 rounded-full mr-2 bg-blue-400"></span>
                        Resources
                    </a>
                </nav>
                <div class="mt-12 pt-6 border-t border-white/10">
                    <p class="text-blue-300 text-xs">Revenue Target</p>
                    <p class="text-white text-lg font-bold">$10,000/week</p>
                    <p class="text-blue-300 text-xs mt-1">by May 25, 2026</p>
                </div>
            </aside>

            <!-- Main Content -->
            <main class="flex-1 p-6 md:p-10">
                <div class="mb-8">
                    <a href="/" class="text-sm text-blue-600 hover:text-blue-700 mb-2 inline-block">← Back to All Projects</a>
                    <h1 class="text-2xl md:text-3xl font-extrabold text-[#1e3a5f]">Archived Tasks</h1>
                    <p class="text-gray-500 mt-1">Completed tasks with timestamps</p>
                </div>

                <div class="bg-white rounded-xl border border-gray-200 p-6">
                    <div id="archiveList" class="space-y-3">
                        <p class="text-gray-400 text-sm" id="emptyMsg">No archived tasks yet.</p>
                    </div>
                    <div class="mt-6 pt-4 border-t border-gray-100">
                        <button onclick="clearArchive()" class="text-xs text-red-400 hover:text-red-600 transition-colors">Clear all archived tasks</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const ARCHIVE_KEY = 'hq_archived_tasks';

        function getArchived() {
            try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); }
            catch(e) { return []; }
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', {
                month: 'short', day: 'numeric', year: 'numeric',
                hour: 'numeric', minute: '2-digit'
            });
        }

        function renderArchive() {
            const tasks = getArchived();
            const list = document.getElementById('archiveList');
            const emptyMsg = document.getElementById('emptyMsg');

            if (tasks.length === 0) {
                emptyMsg.style.display = 'block';
                return;
            }

            emptyMsg.style.display = 'none';
            list.innerHTML = '';

            // newest first
            [...tasks].reverse().forEach(task => {
                const el = document.createElement('div');
                el.className = 'flex items-start justify-between gap-3 p-4 bg-green-50 rounded-lg border border-green-200';
                el.innerHTML = `
                    <div class="flex items-start gap-3">
                        <div class="w-3 h-3 rounded-full bg-green-500 mt-1 flex-shrink-0"></div>
                        <div>
                            <p class="font-medium text-[#1e3a5f] text-sm">${task.title}</p>
                            <p class="text-xs text-gray-600 mt-0.5">${task.description}</p>
                        </div>
                    </div>
                    <span class="flex-shrink-0 text-xs bg-green-100 text-green-700 px-2 py-1 rounded-full whitespace-nowrap">
                        ✓ ${formatDate(task.completedAt)}
                    </span>
                `;
                list.appendChild(el);
            });
        }

        function clearArchive() {
            if (confirm('Clear all archived tasks?')) {
                localStorage.removeItem(ARCHIVE_KEY);
                renderArchive();
            }
        }

        renderArchive();
    </script>
</body>
</html>
